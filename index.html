<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHIZORA</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    align-items: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.nav a {
    margin: 0 15px;
    color: #ccc;
    text-decoration: none;
}

.btn {
    background: purple;
    padding: 10px 20px;
    border-radius: 12px;
}

/* HERO */
.hero {
    display: flex;
    padding: 40px;
    align-items: center;
    gap: 40px;
}

.hero-text {
    flex: 1;
}

.hero-text h1 {
    font-size: 50px;
}

.hero img {
    width: 400px;
    border-radius: 20px;
}

/* MODES */
.modes {
    display: flex;
    padding: 40px;
    gap: 20px;
}

/* LEFT LIST */
.mode-list {
    width: 300px;
}

.mode-item {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 12px;
    cursor: pointer;
}

.mode-item:hover {
    background: rgba(255,255,255,0.1);
}

/* RIGHT PANEL */
.mode-display {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
}

/* IMAGE FIX */
.mode-image {
    width: 100%;
    height: 400px;
    border-radius: 20px;
    overflow: hidden;
}

.mode-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">SCHIZORA</div>
    <div class="nav">
        <a href="#">Presale</a>
        <a href="#">Modes</a>
        <a href="#">Tokenomics</a>
        <a href="#">Whitepaper</a>
    </div>
    <div class="btn">Connect Wallet</div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-text">
        <h1>SEVEN MINDS.<br>ONE TOKEN.</h1>
        <p>SCHIZORA ($SZR) behavioral token.</p>
    </div>

    <!-- PUNE LOGO TAU -->
    <img src="assets/logo.png">
</div>

<!-- MODES -->
<div class="modes">

    <!-- LEFT -->
    <div class="mode-list">
        <div class="mode-item" onclick="setMode(1)">Mode 1 - Calm</div>
        <div class="mode-item" onclick="setMode(2)">Mode 2 - Burn</div>
        <div class="mode-item" onclick="setMode(3)">Mode 3 - Reward</div>
        <div class="mode-item" onclick="setMode(4)">Mode 4 - Chaos</div>
        <div class="mode-item" onclick="setMode(5)">Mode 5 - Mirror</div>
        <div class="mode-item" onclick="setMode(6)">Mode 6 - Silent</div>
        <div class="mode-item" onclick="setMode(7)">Mode 7 - Predator</div>
        <div class="mode-item" onclick="setMode(8)">Mode 8 - Parasite</div>
    </div>

    <!-- RIGHT -->
    <div class="mode-display">

        <div class="mode-image">
            <img id="modeImg" src="assets/mode1.png">
        </div>

        <h2 id="modeTitle">Calm Mode</h2>
        <p id="modeDesc">Stable market phase.</p>

    </div>

</div>

<script>
const modes = {
1: {img:"assets/mode1.png", title:"Calm Mode", desc:"Stable market phase"},
2: {img:"assets/mode2.png", title:"Burn Mode", desc:"Supply reduction"},
3: {img:"assets/mode3.png", title:"Reward Mode", desc:"Holder rewards"},
4: {img:"assets/mode4.png", title:"Chaos Mode", desc:"Volatility"},
5: {img:"assets/mode5.png", title:"Mirror Mode", desc:"Market adaptive"},
6: {img:"assets/mode6.png", title:"Silent Mode", desc:"Stealth growth"},
7: {img:"assets/mode7.png", title:"Predator Mode", desc:"Punishes sellers"},
8: {img:"assets/mode8.png", title:"Parasite Mode", desc:"Feeds on collapse"}
};

function setMode(id){
    document.getElementById("modeImg").src = modes[id].img;
    document.getElementById("modeTitle").innerText = modes[id].title;
    document.getElementById("modeDesc").innerText = modes[id].desc;
}
</script>

</body>
</html>
